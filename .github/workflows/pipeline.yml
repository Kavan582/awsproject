name: CI/CD Pipeline

on:
  workflow_dispatch:   # 🔥 manual trigger only (as you wanted)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔐 Trivy Scan (filesystem)
    - name: Trivy Scan (Filesystem)
      uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: fs
        scan-ref: .

    # 🐳 Build Docker Image
    - name: Build Docker Image
      run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🛡 Trivy Scan (Image)
    - name: Trivy Scan (Image)
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: suriya396/amazon:${{ github.sha }}
        severity: CRITICAL
        exit-code: 1

    # 🔑 Docker Login
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🚀 Push Docker Image
    - name: Push Docker Image
      run: docker push suriya396/amazon:${{ github.sha }}

    # ⚙ Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    # ⚙ Setup Helm
    - name: Setup Helm
      uses: azure/setup-helm@v4

    # 🔑 Configure kubeconfig
    - name: Set kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

    # 🚀 Deploy using Helm
    - name: Deploy to Kubernetes
      run: |
        helm upgrade --install amazon ./amazon \
        --set image.repository=suriya396/amazon \
        --set image.tag=${{ github.sha }}
