name: CI/CD Pipeline

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🛡 Install Trivy (stable)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb stable main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    # 🔐 Trivy Scan (filesystem)
    - name: Trivy Scan FS
      run: trivy fs .

    # 🐳 Build Docker Image
    - name: Build Docker Image
      run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🛡 Trivy Scan (image)
    - name: Trivy Scan Image
      run: trivy image --severity CRITICAL suriya396/amazon:${{ github.sha }}

    # 🔑 Docker Login
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🚀 Push Docker Image
    - name: Push Docker Image
      run: docker push suriya396/amazon:${{ github.sha }}

    # ⚙ Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    # ⚙ Setup Helm
    - name: Setup Helm
      uses: azure/setup-helm@v4

    # 🔑 Configure kubeconfig
    - name: Set kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

    # 🚀 Deploy using Helm
    - name: Deploy to Kubernetes
      run: |
        helm upgrade --install amazon ./amazon \
        --set image.repository=suriya396/amazon \
        --set image.tag=${{ github.sha }} \
        --set image.pullPolicy=Always
