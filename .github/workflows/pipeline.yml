name: CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔐 Trivy (official action)
    - name: Trivy Scan (Filesystem)
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        scan-type: 'fs'
        scan-ref: '.'

    # 🐳 Build Image
    - name: Build Docker Image
      run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🔐 Trivy Image Scan
    - name: Trivy Scan (Image)
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        image-ref: 'suriya396/amazon:${{ github.sha }}'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'

    # 🔑 Docker Login
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🚀 Push Image
    - name: Push Docker Image
      run: docker push suriya396/amazon:${{ github.sha }}
